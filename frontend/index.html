<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Notebook - Feed</title>
    <script src="/theme.js" defer></script>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body data-page="feed">
    <header class="topbar">
      <div class="topbar-inner">
        <p class="brand-mark">Pixel Notebook</p>
        <div class="topbar-actions">
          <nav aria-label="Main">
            <a href="/" class="top-link active">Home</a>
            <a href="/admin" class="top-link" id="adminEntryLink">Admin</a>
          </nav>
          <button id="adminLogoutButton" class="top-action-button" type="button" hidden>Logout</button>
          <button id="themeToggle" class="theme-toggle" type="button">Theme: Light</button>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="panel timeline-panel">
        <header class="timeline-head">
          <h1 class="site-title">Posts</h1>
          <p class="site-subtitle">Reverse chronological timeline</p>
        </header>
        <p id="feedStatus" class="status-text">Loading timeline...</p>
        <ul id="feedList" class="feed-list"></ul>
      </section>
    </main>
  </body>
</html>
