<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Notebook - Feed</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body data-page="feed">
    <header class="topbar">
      <div class="topbar-inner">
        <p class="brand-mark">Pixel Notebook</p>
        <nav aria-label="Main">
          <a href="/" class="top-link active">Home</a>
        </nav>
      </div>
    </header>

    <main class="page-shell timeline-shell">
      <aside class="panel profile-panel">
        <h1 class="site-title">Pixel Notebook</h1>
        <p class="site-subtitle">A tiny personal corner of the internet, inspired by old Twitter timelines.</p>
      </aside>

      <section class="panel timeline-panel">
        <h2 class="timeline-title">Posts</h2>
        <p id="feedStatus" class="status-text">Loading timeline...</p>
        <ul id="feedList" class="feed-list"></ul>
      </section>

      <aside class="panel info-panel">
        <h2>Notes</h2>
        <p>Each feed card shows a short post preview and a few recent comments.</p>
        <p class="small-note">Open any post to read the full thread and leave a comment.</p>
      </aside>
    </main>
  </body>
</html>
