<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Notebook - Post</title>
    <script src="/theme.js" defer></script>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body data-page="post">
    <header class="topbar">
      <div class="topbar-inner">
        <p class="brand-mark">Pixel Notebook</p>
        <div class="topbar-actions">
          <nav aria-label="Main">
            <a href="/" class="top-link">Home</a>
            <a href="#" class="top-link active">Post</a>
            <a href="/admin" class="top-link" id="adminEntryLink">Admin</a>
          </nav>
          <button id="adminLogoutButton" class="top-action-button" type="button" hidden>Logout</button>
          <button id="themeToggle" class="theme-toggle" type="button">Theme: Light</button>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <article class="panel post-article">
        <p class="back-row"><a href="/" class="inline-link"><- Back to feed</a></p>
        <p id="postStatus" class="status-text">Loading post...</p>
        <section id="postView"></section>
      </article>

      <section class="panel comments-panel">
        <h2>Comments</h2>
        <ul id="commentList" class="comment-list"></ul>

        <form id="commentForm" class="comment-form">
          <label for="nameInput">Name (optional)</label>
          <input id="nameInput" name="name" type="text" placeholder="Anonymous visitor" />

          <label for="contentInput">Comment</label>
          <textarea
            id="contentInput"
            name="content"
            rows="4"
            placeholder="Leave a note..."
            required
          ></textarea>

          <div class="honeypot-wrap" aria-hidden="true">
            <label for="websiteInput">Website</label>
            <input
              id="websiteInput"
              name="website"
              type="text"
              class="honeypot"
              autocomplete="off"
              tabindex="-1"
            />
          </div>

          <button type="submit">Send Comment</button>
          <p id="commentStatus" class="status-text"></p>
        </form>
      </section>
    </main>
  </body>
</html>
